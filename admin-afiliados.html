<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosê APP — Gestão de Parceiras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="fundo-admin-painel">

    <header class="topo-admin">
        <div class="logo-redonda-pequena" style="background: var(--cor-destaque); color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 18px;">R</div>
        <div class="info-topo">
            <h2 style="color: #FFF;">Parceiras & Pagamentos</h2>
            <button onclick="sairDoAdmin()" class="btn-sair" style="color: #AAA;">Encerrar Sessão</button>
        </div>
    </header>

    <main class="container-dashboard" style="padding-bottom: 100px;">

        <div class="secao-dashboard">
            <h3 class="titulo-secao" style="color: var(--cor-destaque);">
                <span class="material-symbols-rounded" style="vertical-align:middle;">military_tech</span> Top Parceiras (Ranking)
            </h3>
            <div class="tabela-equipe" id="ranking-afiliados">
                <p style="text-align:center; color:#888; font-size:13px;">Carregando ranking...</p>
            </div>
        </div>

        <div class="secao-dashboard" style="margin-top: 30px;">
            <h3 class="titulo-secao" style="color: #FFF;">
                <span class="material-symbols-rounded" style="vertical-align:middle;">payments</span> Folha de Pagamento
            </h3>
            <div id="lista-pagamento-afiliados" style="display:flex; flex-direction:column; gap:15px;">
                <p style="text-align:center; color:#888; font-size:13px;">Buscando comissões...</p>
            </div>
        </div>

        <div class="cartao-perfil" style="background: #1C1C1E; border: 1px solid #333; margin-top: 30px;">
            <div class="cabecalho-perfil">
                <span class="material-symbols-rounded" style="color: var(--cor-destaque);">support_agent</span>
                <h3 style="color: #FFF;">Suporte a Parceiras</h3>
            </div>

            <select id="seletor-chat-afiliado" onchange="carregarChatAfiliadoSelecionado()" style="width:100%; padding:12px; border-radius:5px; background:#111; color:#FFF; border:1px solid #444; margin-bottom:15px; font-family:'Montserrat',sans-serif;">
                <option value="">Selecione uma parceira...</option>
            </select>

            <div class="area-chat" id="historico-chat-admin-afiliado" style="background:#111; border:1px solid #444; display:none;"></div>
            <div class="area-enviar-mensagem" id="area-input-afiliado" style="display:none;">
                <input type="text" id="nova-msg-admin-afiliado" placeholder="Responder parceira..." style="background:#222; color:#FFF; border:1px solid #444;">
                <button onclick="responderAfiliado()" class="btn-enviar-msg" style="background: var(--cor-destaque); color: #fff;">
                    <span class="material-symbols-rounded">send</span>
                </button>
            </div>
        </div>

    </main>

    <nav class="menu-inferior menu-admin">
        <a href="admin-painel.html" class="menu-item">
            <span class="material-symbols-rounded">monitoring</span>
            <span>Dashboard</span>
        </a>
        <a href="admin-usuarios.html" class="menu-item">
            <span class="material-symbols-rounded">manage_accounts</span>
            <span>Salões</span>
        </a>
        <a href="admin-afiliados.html" class="menu-item ativo">
            <span class="material-symbols-rounded">handshake</span>
            <span>Parceiras</span>
        </a>
        <a href="admin-suporte.html" class="menu-item">
            <span class="material-symbols-rounded">forum</span>
            <span>Suporte</span>
        </a>
        <a href="admin-config.html" class="menu-item">
            <span class="material-symbols-rounded">admin_panel_settings</span>
            <span>Config.</span>
        </a>
    </nav>

    <script src="admin-afiliados.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosê APP — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Bebas+Neue&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-login">
        <div class="box-login">

            <div class="logo-area">
                <!-- Logo SVG inline para carregamento instantâneo -->
                <img src="logo.svg" alt="Rosê APP" style="width: 110px; height: 110px; object-fit: contain; margin-bottom: -10px;">
            </div>

            <h1 class="titulo-app">Bem-vinda de volta</h1>
            <p class="subtitulo">Acesse o painel do seu salão</p>

            <form id="form-login">
                <div class="grupo-input">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="grupo-input">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Sua senha secreta" required>
                </div>

                <a href="#" onclick="esqueciMinhaSenha('usuario'); return false;"
                   style="color: #BBB; font-size: 13px; text-decoration: underline; display: block; margin-bottom: 20px;">
                   Esqueci minha senha
                </a>

                <button type="submit" class="btn-principal">ENTRAR</button>
            </form>

            <div class="area-cadastro">
                <p>Ainda não tem conta no Rosê APP?</p>
                <button class="btn-secundario" onclick="window.location.href='cadastro.html'">CRIAR CONTA GRÁTIS</button>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

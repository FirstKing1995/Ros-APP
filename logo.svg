<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1C1E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D2B2F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B76E79;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A0AB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B76E79;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#D4A0AB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B76E79;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <!-- Fundo circular principal -->
  <circle cx="150" cy="150" r="148" fill="url(#bgGrad)" />

  <!-- Anel rose gold decorativo externo -->
  <circle cx="150" cy="150" r="140" fill="none" stroke="url(#ringGrad)" stroke-width="2" stroke-dasharray="12 5" />

  <!-- Pétala decorativa superior (elemento floral abstrato) -->
  <ellipse cx="150" cy="78" rx="12" ry="22" fill="url(#roseGrad)" opacity="0.6" transform="rotate(0 150 150)" />
  <ellipse cx="150" cy="78" rx="12" ry="22" fill="url(#roseGrad)" opacity="0.4" transform="rotate(45 150 150)" />
  <ellipse cx="150" cy="78" rx="12" ry="22" fill="url(#roseGrad)" opacity="0.4" transform="rotate(90 150 150)" />
  <ellipse cx="150" cy="78" rx="12" ry="22" fill="url(#roseGrad)" opacity="0.4" transform="rotate(135 150 150)" />
  <ellipse cx="150" cy="78" rx="12" ry="22" fill="url(#roseGrad)" opacity="0.4" transform="rotate(180 150 150)" />
  <ellipse cx="150" cy="78" rx="12" ry="22" fill="url(#roseGrad)" opacity="0.4" transform="rotate(225 150 150)" />
  <ellipse cx="150" cy="78" rx="12" ry="22" fill="url(#roseGrad)" opacity="0.4" transform="rotate(270 150 150)" />
  <ellipse cx="150" cy="78" rx="12" ry="22" fill="url(#roseGrad)" opacity="0.4" transform="rotate(315 150 150)" />

  <!-- Centro floral -->
  <circle cx="150" cy="150" r="52" fill="url(#bgGrad)" />

  <!-- Letra R estilizada -->
  <text x="150" y="178" font-family="Georgia, serif" font-size="80" font-weight="700"
        fill="url(#roseGrad)" text-anchor="middle" letter-spacing="-2">R</text>

  <!-- Texto ROSÊ abaixo -->
  <text x="150" y="232" font-family="Georgia, serif" font-size="22" font-weight="400"
        fill="#B76E79" text-anchor="middle" letter-spacing="8" opacity="0.9">ROSÊ</text>

  <!-- Linha decorativa -->
  <line x1="100" y1="242" x2="200" y2="242" stroke="url(#roseGrad)" stroke-width="1" opacity="0.5" />

  <!-- APP abaixo da linha -->
  <text x="150" y="262" font-family="Georgia, serif" font-size="13" font-weight="400"
        fill="#8A6870" text-anchor="middle" letter-spacing="5">APP</text>
</svg>

<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Rosê APP — Gestão de Salões</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body class="fundo-admin-painel">

        </div>

    <main class="container-dashboard">

        <div class="cabecalho-acoes-admin" style="margin-bottom: 15px;">
            <div class="grupo-input input-admin" style="margin: 0; flex: 1;">
                <input type="text" id="pesquisa-barbearia" placeholder="Pesquisar por nome ou e-mail..." onkeyup="filtrarUsuarios()">

        <div id="lista-usuarios-admin">
            <p style="text-align: center; color: #888; padding: 20px;">Carregando lista de salões...</p>

    </main>

    <nav class="menu-inferior menu-admin">
        <a href="admin-painel.html" class="menu-item">
            <span class="material-symbols-rounded">monitoring</span>

            <span class="material-symbols-rounded">handshake</span>
            <span>Parceiras</span>
        </a>
        <a href="admin-suporte.html" class="menu-item">
            <span class="material-symbols-rounded">forum</span>
            <span>Suporte</span>
        </a>
        <a href="admin-config.html" class="menu-item">
            <span class="material-symbols-rounded">admin_panel_settings</span>
